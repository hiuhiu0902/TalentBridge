app.jwt.expiration-ms=86400000

# ===========================
# Logging
# ===========================
logging.level.com.demo.talentbridge=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG

# ===========================
# Jackson
