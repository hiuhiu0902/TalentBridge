# ===========================
# TalentBridge Application Config
# ===========================

server.port=${PORT:8080}
server.forward-headers-strategy=framework


# ===========================
# Database - MySQL (Railway)
# ===========================
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQL_DATABASE}?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true&connectTimeout=30000&socketTimeout=30000
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===========================
# JPA / Hibernate
# ===========================
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

# ===========================
# Flyway
# ===========================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ===========================
# JWT Configuration
# ===========================
app.jwt.secret=dGFsZW50YnJpZGdlc2VjcmV0a2V5Zm9yandiYXNlNjRlbmNvZGVkc3RyaW5nMTIzNDU2Nzg5MA==
app.jwt.expiration-ms=86400000

# ===========================
# Logging
# ===========================
logging.level.com.demo.talentbridge=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG

# ===========================
# Jackson
# ===========================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=Asia/Ho_Chi_Minh

