<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Password Reset</title>
</head>
<body style="font-family: Arial, sans-serif; background:#f6f6f6; padding:24px;">
<table style="max-width:600px; margin:0 auto; background:#ffffff; border-radius:8px; padding:32px;">
    <tr>
        <td>
            <h2 style="margin-top:0;">Reset your password</h2>
            <p>Hello <strong th:text="${name}">User</strong>,</p>
            <p>We received a request to reset your <span th:text="${productName}">TalentBridge</span> password.</p>
            <p>This link will expire in <strong th:text="${expiryMinutes}">30</strong> minutes.</p>

            <p style="margin:24px 0;">
                <a th:href="${resetLink}"
                   style="background:#2563eb; color:white; text-decoration:none; padding:12px 20px; border-radius:6px; display:inline-block;">
                    Reset Password
                </a>
            </p>

            <p>If the button does not work, copy and paste this link into your browser:</p>
            <p><a th:href="${resetLink}" th:text="${resetLink}"></a></p>

            <p>If you did not request this, you can ignore this email.</p>

            <hr style="margin:24px 0; border:none; border-top:1px solid #eee;">
            <p style="color:#666;">TalentBridge</p>
        </td>
    </tr>
</table>
</body>
</html>
